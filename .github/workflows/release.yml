---
name: Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    uses: ./.github/workflows/main.yml
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Required for PyPI OIDC trusted publishing
      contents: write  # Required for creating GitHub Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pdm-backend SCM versioning needs tag history
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.13'
      - name: Build packages
        # Pin the version explicitly from the tag. Bypasses pdm-backend's
        # SCM dirty-tree detection, which can append a PEP-440 local
        # segment (e.g. `+d20260521`) that PyPI rejects with 400.
        run: |
          export PDM_BUILD_SCM_VERSION="${GITHUB_REF_NAME#v}"
          pdm build
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz
      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # The action re-signs internally; the explicit Sigstore step
          # above remains the source of truth for the .sigstore bundles
          # attached to the GitHub Release.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Extract release notes from CHANGELOG
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          # Tag is `v1.2.1`; CHANGELOG entries are headed `## [1.2.1]`.
          version: ${{ github.ref_name }}
          path: ./CHANGELOG.md
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || format('Release {0}. See [CHANGELOG.md](CHANGELOG.md) for details.', github.ref_name) }}
          # Tags like v1.2.3rc1, v1.2.3a1, v1.2.3.dev0 → pre-release.
          # Plain v1.2.3 → stable.
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'dev') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore
          fail_on_unmatched_files: true
