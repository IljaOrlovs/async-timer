---
name: Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    uses: ./.github/workflows/main.yml
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Required for PyPI OIDC trusted publishing
      contents: write  # Required for creating GitHub Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # pdm-backend SCM versioning needs tag history
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.13'
      - name: Build packages
        # Pin the version explicitly from the tag. Bypasses pdm-backend's
        # SCM dirty-tree detection, which can append a PEP-440 local
        # segment (e.g. `+d20260521`) that PyPI rejects with 400.
        run: |
          export PDM_BUILD_SCM_VERSION="${GITHUB_REF_NAME#v}"
          pdm build
      - name: Publish to Test PyPI
        run: pdm publish --no-build --repository https://test.pypi.org/legacy/
      - name: Publish to PyPI
        run: pdm publish --no-build
      - name: Extract release notes from CHANGELOG
        # Pulls the section under `## [<version>] - <date>` from
        # CHANGELOG.md so the GitHub Release body matches what's already
        # documented. Falls back to a minimal note if the entry is
        # missing (e.g. a hotfix tag landed without a CHANGELOG bump).
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          # Tag is `v1.2.1`; CHANGELOG entries are headed `## [1.2.1]`.
          version: ${{ github.ref_name }}
          path: ./CHANGELOG.md
        continue-on-error: true
      - name: Create GitHub Release
        # Runs after PyPI succeeds so a published release on GitHub
        # always corresponds to a real PyPI version. The wheel + sdist
        # built above are attached as release assets, giving users a
        # checksummable artifact independent of PyPI.
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || format('Release {0}. See [CHANGELOG.md](CHANGELOG.md) for details.', github.ref_name) }}
          # Tags like v1.2.3rc1, v1.2.3a1, v1.2.3.dev0 → pre-release.
          # Plain v1.2.3 → stable.
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'dev') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true
